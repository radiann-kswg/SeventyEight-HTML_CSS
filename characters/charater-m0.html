<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/stylesheet.css" />
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/vue@3.5.13"></script>
    <script>
      window.Vue ||
        document.write(
          '<script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"><\/script>',
        );
    </script>
    <title>愚者：フェニクス - 運命線探偵78</title>
    <meta
      name="description"
      content="「運命線探偵78」は、ラジアン(柏木主税)によってタロットカードから異能探偵としてキャラクターデザインされたオリジナルキャラおよびその周辺コンテンツです。"
    />
  </head>
  <body>
    <header>
      <div id="app-menu">
        <hamberger-menu></hamberger-menu>
      </div>
      <script src="/src/hamberger-menu.js"></script>
    </header>
    <main id="app-character-page">
      <character-page-comp>
        <template #title>愚者：フェニクス</template>
        “未来消失”という神隠し現象を悪用した特殊事件の情報を得るため、各所に視察任務を行っている異能組織『セブンティエイト特殊探偵団』（通称『運命線探偵』）の情報屋。<br />
        【愚かな旅人】のアルカナムスペックを行使する彼は、不死鳥を宿した能力で相手の攻撃を軽やかに躱し
        浄化の炎で敵を薙ぎ払います。<br />
        ただ、どうやら采配幹部(ディーラーズ)の２人の呼び名はいつも姉妹で逆になってしまう模様…
        <a class="a-link" href="https://radiann-kswg.booth.pm/items/7646689"
          >制作進捗配布 Vol.1</a
        >
        <template #fullname>【愚かな旅人】フェニクス・ゼロウス</template>
        <template #cardnumber>メジャーズ0番（遠し番号22番）</template>
        <template #gender>男性型</template>
        <template #species>狛犬</template>
        <template #class>情報屋</template>
        <template #characterimage>
          <img
            alt="愚者：フェニクス"
            src="/img/crddsn/crddsn_imgFLM0.png"
            class="character-img"
          />
        </template>
      </character-page-comp>
    </main>
    <script src="/src/character-page.js"></script>
    <footer>
      <div id="app-credit">
        <footer-credit></footer-credit>
      </div>
    </footer>
    <script src="/src/credit-footer.js"></script>
  </body>
</html>
