<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/stylesheet.css" />
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/vue@3.5.13"></script>
    <script>
      window.Vue ||
        document.write(
          '<script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"><\/script>',
        );
    </script>
    <title>魔術師：オリジン - 運命線探偵78</title>
    <meta
      name="description"
      content="「運命線探偵78」は、ラジアン(柏木主税)によってタロットカードから異能探偵としてキャラクターデザインされたオリジナルキャラおよびその周辺コンテンツです。"
    />
  </head>
  <body>
    <header>
      <div id="app-menu">
        <hamberger-menu></hamberger-menu>
      </div>
      <script src="/src/hamberger-menu.js"></script>
    </header>
    <main id="app-character-page">
      <character-page-comp>
        <template #title>魔術師：オリジン</template>
        “未来消失”という神隠し現象を巡る幾つもの特殊事件を解決し、異能組織『セブンティエイト特殊探偵団』（通称『運命線探偵』）の中でも名探偵と称される最高幹部。<br />
        【四元の魔術師】のアルカナムスペックを行使する彼は、まるで錬金術のような元素操作を得意とし
        改竄された運命線の手掛かりと証拠を迅速に掴みます。<br />
        ちなみに、副業として自営業も営んでいることから
        運命線探偵の人事にも強く関わりがある様子。
        <a class="a-link" href="https://radiann-kswg.booth.pm/items/7646689"
          >制作進捗配布 Vol.1</a
        >
        <template #fullname>【四元の魔術師】オリジン・マギカルテット</template>
        <template #cardnumber>メジャーズ1番（遠し番号1番）</template>
        <template #gender>無性別男性型</template>
        <template #species>人間</template>
        <template #class>最高幹部</template>
        <template #characterimage>
          <img
            alt="魔術師：オリジン"
            src="/img/crddsn/crddsn_imgFLM1.png"
            class="character-img"
          />
        </template>
      </character-page-comp>
    </main>
    <script src="/src/character-page.js"></script>
    <footer>
      <div id="app-credit">
        <footer-credit></footer-credit>
      </div>
    </footer>
    <script src="/src/credit-footer.js"></script>
  </body>
</html>
