<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/stylesheet.css" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/vue@3.5.13"></script>
    <script>
      window.Vue ||
        document.write(
          '<script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"><\/script>',
        );
    </script>
    <title>女帝：ウェヌス - 運命線探偵78</title>
    <meta
      name="description"
      content="「運命線探偵78」は、ラジアン(柏木主税)によってタロットカードから異能探偵としてキャラクターデザインされたオリジナルキャラおよびその周辺コンテンツです。"
    />

  <body>
    <header>
      <div id="app-menu">
        <hamberger-menu></hamberger-menu>
      </div>
      <script src="/src/hamberger-menu.js"></script>
    </header>
    <main id="app-character-page">
      <character-page-comp>
        <template #title>女帝：ウェヌス</template>
        “未来消失”という神隠し現象を取り巻く特殊事件の未然防止に努める、異能組織『セブンティエイト特殊探偵団』（通称『運命線探偵』）の第３幹部。<br />
        【九星の女帝】のアルカナムスペックを行使する彼女は、周囲の精神状態を静かに操作する力があり
        引き金となるアリバイから特殊事件を丸く収めることに長けています。<br />
        ただ、周りの男性を駄目にしてしまうほどの母性と包容力があるせいで、宴会ではお持ち帰り（をする）役に立ちまわりがちという噂があり…
        <a class="a-link" href="https://radiann-kswg.booth.pm/items/7646689"
          >制作進捗配布 Vol.1</a
        >
        <template #fullname>【九星の女帝】ウェヌス・ハピネス</template>
        <template #cardnumber>メジャーズ3番（遠し番号3番）</template>
        <template #gender>女性型</template>
        <template #species>超過人間</template>
        <template #class>国際幹部</template>
        <template #characterimage>
          <img
            alt="女帝：ウェヌス"
            src="/img/crddsn/crddsn_imgFLM3.png"
            class="character-img"
          />
        </template>
      </character-page-comp>
    </main>
    <script src="/src/character-page.js"></script>
    <footer>
