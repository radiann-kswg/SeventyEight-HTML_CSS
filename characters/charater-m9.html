<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/stylesheet.css" />
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/vue@3.5.13"></script>
    <script>
      window.Vue ||
        document.write(
          '<script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"><\/script>',
        );
    </script>
    <title>隠者：ヴェール - 運命線探偵78</title>
    <meta
      name="description"
      content="「運命線探偵78」は、ラジアン(柏木主税)によってタロットカードから異能探偵としてキャラクターデザインされたオリジナルキャラおよびその周辺コンテンツです。"
    />
  </head>
  <body>
    <header>
      <div id="app-menu">
        <hamberger-menu></hamberger-menu>
      </div>
      <script src="/src/hamberger-menu.js"></script>
    </header>
    <main id="app-character-page">
      <character-page-comp>
        <template #title>隠者：ヴェール</template>
        “未来消失”という神隠し現象について
        表向きでは九蓮国の大学助教授として科学的な研究を、裏向きでは異能組織『セブンティエイト特殊探偵団』（通称『運命線探偵』）の第９幹部として事件の科捜研を担っています。<br />
        【秘匿の隠者】のアルカナムスペックを行使する彼は、知覚や感覚を自分の近辺に結集させることで
        敵の注意を掻い潜ったり高い洞察力を発揮したりするなど戦闘でも迷彩的な状況掌握能力を有しています。<br />
        しかしチームでの事件捜索にはまだ慣れない様子で……
        <a class="a-link" href="https://radiann-kswg.booth.pm/items/7646689"
          >制作進捗配布 Vol.1</a
        >
        <template #fullname>【秘匿の隠者】ヴェール・コンセントレイト</template>
        <template #cardnumber>メジャーズ9番（遠し番号9番）</template>
        <template #gender>無性別中性型</template>
        <template #species>超過人間</template>
        <template #class>九蓮国支部幹部</template>
        <template #characterimage>
          <img
            alt="隠者：ヴェール"
            src="/img/crddsn/crddsn_imgFLM9.png"
            class="character-img"
          />
        </template>
      </character-page-comp>
    </main>
    <script src="/src/character-page.js"></script>
    <footer>
      <div id="app-credit">
        <footer-credit></footer-credit>
      </div>
    </footer>
    <script src="/src/credit-footer.js"></script>
  </body>
</html>
